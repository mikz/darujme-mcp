[tools]
python = "3.13"
uv = "latest"

[tasks.sync]
run = "uv sync --locked"

[tasks.test]
run = "uv run --locked pytest"

[tasks.e2e]
run = "uv run --locked pytest -m e2e"

[tasks.lint]
run = "uv run --locked ruff check ."

[tasks.format-check]
run = "uv run --locked ruff format --check src tests"

[tasks.check]
depends = ["test", "lint", "format-check"]

[tasks.mcp]
run = "uv run --locked darujme-mcp"

[tasks.mcp-reload]
run = "uv run --locked fastmcp run src/server.py:mcp --transport stdio --reload --reload-dir src --no-banner"

[tasks.mcp-inspect]
run = "uv run --locked fastmcp inspect src/server.py:mcp --format mcp"
